<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布闲置 - 校园优淘</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .publish-form{
            width:700px;
            margin:40px auto;
            padding:30px;
            background:#f5f7fa;
            border-radius:12px;
        }
        .publishing-form h3{
            text-align:center;
            color:#42A5F5;
            margin-bottom:24px;
        }
        .form-item{
            margin-bottom:18px;
        }
        .form-item label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }
        .form-item input,.form-item textarea,.form-item select{
            width:100%;
            padding:10px;
            border:1px solid #ddd;
            border-radius:6px;
        }
        .submit-pub{
            width:100%;
            padding:12px;
            background:#42A5F5;
            border:none;
            color:#fff;
            font-size:16px;
            border-radius:6px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-wrap">
            <a href="index.html" class="logo">校园优淘</a>
            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="goods.html" class="nav-link">二手好物</a>
                <a href="buy.html" class="nav-link">我要求购</a>
                <a href="publish.html" class="nav-link active">发布闲置</a>
                <a href="profile.html" class="nav-link">个人中心</a>
            </nav>
            <div class="header-btn">
                <button class="auth-btn">校园实名认证</button>
            </div>
        </div>
    </header>

    <div class="publishing-form">
        <h3>发布你的闲置物品，校内学生一键咨询</h3>
        <div class="form-item">
            <label>物品分类</label>
            <select>
                <option>教材书籍</option>
                <option>数码电子产品</option>
                <option>运动器材</option>
                <option>服饰生活用品</option>
            </select>
        </div>
        <div class="form-item">
            <label>物品标题</label>
            <input type="text" placeholder="简洁描述物品，更容易被搜到">
        </div>
        <div class="form-item">
            <label>售价（元）</label>
            <input type="number" placeholder="填写转让价格">
        </div>
        <div class="form-item">
            <label>物品成色</label>
            <select>
                <option>全新未使用</option>
                <option>九成新（几乎无磨损）</option>
                <option>八成新（轻微使用痕迹）</option>
                <option>五成新（正常使用磨损）</option>
            </select>
        </div>
        <div class="form-item">
            <label>自提地点</label>
            <input type="text" placeholder="填写宿舍、教学楼、食堂等校内地点">
        </div>
        <div class="form-item">
            <div class="form-item">
    <label>上传物品实拍图</label>
    <input type="file" multiple accept="image/png,image/jpg">
    <p style="font-size:13px;color:#666;margin-top:4px;">支持多张图片上传，推荐清晰实拍图</p>
</div>
            <label>物品详细描述</label>
            <textarea rows="4" placeholder="配件、使用时长、有无损坏等详细说明"></textarea>
        </div>
        <button class="submit-pub" onclick="alert('闲置发布成功！将展示在二手好物列表')">立即发布</button>
    </div>

    <footer class="footer">
        <div class="container footer-wrap">
            <div class="footer-left">
                <h3>校园优淘</h3>
                <p>本校专属闲置循环平台，让校园好物二次利用</p>
            </div>
            <div class="footer-right">
                <p>客服校内微信：campustao2026</p>
                <p>©2026 校园优淘 版权所有</p>
            </div>
        </div>
    </footer>
    <script src="main.js"></script>
</body>
</html>
