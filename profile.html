<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园优淘</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-box{
            width:1200px;
            margin:40px auto;
            display:grid;
            grid-template-columns: 280px 1fr;
            gap:30px;
        }
        /* 左侧用户信息栏 */
        .user-info{
            background:#f5f7fa;
            padding:30px;
            border-radius:12px;
            text-align:center;
        }
        .user-info h3{
            color:#42A5F5;
            margin:10px 0;
            font-size:20px;
        }
        .info-line{
            margin:12px 0;
            color:#555;
            font-size:15px;
        }
        .user-btn{
            margin-top:20px;
            width:100%;
        }
        /* 右侧标签导航 */
        .tab-nav{
            display:flex;
            gap:10px;
            border-bottom:1px solid #ddd;
            padding-bottom:10px;
            margin-bottom:25px;
        }
        .tab-nav button{
            border:none;
            background:#fff;
            padding:8px 16px;
            font-size:16px;
            cursor:pointer;
            border-radius:6px;
        }
        .tab-nav button.active{
            background:#FFB74D;
            color:#fff;
        }
        .tab-panel{
            display:none;
        }
        .tab-panel.show{
            display:block;
        }
        .empty-tip{
            color:#777;
            font-size:16px;
            padding:40px 0;
            text-align:center;
        }
        .goods-mini-card{
            display:grid;
            grid-template-columns: repeat(3,1fr);
            gap:20px;
        }
        .record-item{
            padding:12px 16px;
            background:#f5f7fa;
            border-radius:8px;
            margin-bottom:12px;
            display:flex;
            justify-content:space-between;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-wrap">
            <a href="index.html" class="logo">校园优淘</a>
            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="goods.html" class="nav-link">二手好物</a>
                <a href="buy.html" class="nav-link">我要求购</a>
                <a href="publish.html" class="nav-link">发布闲置</a>
                <a href="profile.html" class="nav-link active">个人中心</a>
            </nav>
            <div class="header-btn">
                <button class="auth-btn">校园实名认证</button>
            </div>
        </div>
    </header>

    <div class="profile-box container">
        <!-- 左侧用户基础信息 -->
        <div class="user-info">
            <h3>未实名学生用户</h3>
            <div class="info-line">学院：未填写</div>
            <div class="info-line">学号：未认证</div>
            <div class="info-line">累计发布：0件</div>
            <div class="info-line">成交订单：0笔</div>
            <button class="main-btn user-btn" onclick="alert('跳转实名认证页面')">去实名认证</button>
        </div>

        <!-- 右侧五大功能标签：我的发布/收藏/订单/交易记录/账号管理 -->
        <div class="profile-main">
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="publish">我的发布</button>
                <button class="tab-btn" data-tab="collect">我的收藏</button>
                <button class="tab-btn" data-tab="order">我的订单</button>
                <button class="tab-btn" data-tab="record">交易记录</button>
                <button class="tab-btn" data-tab="account">账号管理</button>
            </div>

            <!-- 1.我的发布 -->
            <div class="tab-panel show" id="publish">
                <h3>我的发布闲置</h3>
                <div class="empty-tip">暂无发布商品，前往【发布闲置】上架你的物品</div>
            </div>

            <!-- 2.我的收藏 -->
            <div class="tab-panel" id="collect">
                <h3>我的收藏好物</h3>
                <div class="empty-tip">还未收藏任何商品，浏览二手好物添加收藏</div>
            </div>

            <!-- 3.我的订单 -->
            <div class="tab-panel" id="order">
                <h3>待交易订单</h3>
                <div class="empty-tip">暂无进行中的订单</div>
            </div>

            <!-- 4.交易记录 -->
            <div class="tab-panel" id="record">
                <h3>历史成交记录</h3>
                <div class="empty-tip">暂无历史交易数据</div>
            </div>

            <!-- 5.账号管理 -->
            <div class="tab-panel" id="account">
                <h3>账号信息管理</h3>
                <div style="margin-top:20px; width:600px;">
                    <div class="form-item" style="margin-bottom:16px;">
                        <label>学号</label>
                        <input type="text" placeholder="完成实名后自动显示学号" disabled>
                    </div>
                    <div class="form-item" style="margin-bottom:16px;">
                        <label>所属学院</label>
                        <input type="text" placeholder="完成实名后填写学院" disabled>
                    </div>
                    <div class="form-item" style="margin-bottom:16px;">
                        <label>登录密码</label>
                        <input type="password" placeholder="点击修改密码">
                    </div>
                    <button class="main-btn" onclick="alert('密码修改弹窗')">修改账号信息</button>
                    <button class="second-btn" style="margin-left:12px;" onclick="alert('退出登录成功，返回首页')">退出登录</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container footer-wrap">
            <div class="footer-left">
                <h3>校园优淘</h3>
                <p>本校专属闲置循环平台，让校园好物二次利用</p>
            </div>
            <div class="footer-right">
                <p>客服校内微信：campustao2026</p>
                <p>©2026 校园优淘 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="main.js">
    // 标签切换逻辑
    const tabBtns = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    tabBtns.forEach(btn=>{
        btn.addEventListener('click',()=>{
            // 清除全部激活状态
            tabBtns.forEach(b=>b.classList.remove('active'));
            panels.forEach(p=>p.classList.remove('show'));
            // 当前标签激活
            btn.classList.add('active');
            const targetId = btn.getAttribute('data-tab');
            document.getElementById(targetId).classList.add('show');
        })
    })
    </script>
</body>
</html>
